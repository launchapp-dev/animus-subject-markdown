name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build release binary (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN=animus-subject-markdown
          ARCHIVE="${BIN}-${{ matrix.target }}.tar.gz"
          tar -C target/${{ matrix.target }}/release -czf "dist/${ARCHIVE}" "${BIN}"
          ( cd dist && shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: animus-subject-markdown-${{ matrix.target }}
          path: dist/animus-subject-markdown-${{ matrix.target }}.tar.gz*

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name "animus-subject-markdown-*.tar.gz" -o -name "animus-subject-markdown-*.tar.gz.sha256" \) -exec cp {} release/ \;
          ls -la release

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign archives with cosign (keyless)
        run: |
          set -euo pipefail
          cd release
          for ARCHIVE in animus-subject-markdown-*.tar.gz; do
            cosign sign-blob \
              --yes \
              --bundle "${ARCHIVE}.bundle" \
              "${ARCHIVE}"
          done
          ls -la

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
